input_file: data/raw/mozart_pc_22_mov1.mp3

separation_model: htdemucs_6s
target_stem: piano

tempo_factors:
  - 1.00
  - 0.95
  - 0.90
  - 0.85

export_format: mp3
mp3_bitrate: 192

# Piano volume in the output: 0 = fully removed, 100 = original level
solo_level: 30

# Pitch correction: set original_freq and target_freq to shift the tuning.
# Leave both at 0 to skip pitch shifting.
# reference_note is informational only (e.g. "a", "e_b", "d_s").
reference_note: e_b
original_freq: 163.20
target_freq: 155

overwrite: false

paths:
  raw: data/raw
  separated: data/separated
  exports: data/exports

outputs:
  logs: outputs/logs
  reports: outputs/reports

logging_level: INFO
